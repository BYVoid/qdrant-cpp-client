syntax = "proto3";

package qdrant;

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message Value {
  oneof kind {
    double double_value = 2;
    int64 integer_value = 3;
    string string_value = 4;
    bool bool_value = 5;
  }
}

message PointId {
  oneof point_id_options {
    uint64 num = 1;
    string uuid = 2;
  }
}

enum Distance {
  UnknownDistance = 0;
  Cosine = 1;
  Euclid = 2;
  Dot = 3;
  Manhattan = 4;
}

message DenseVector {
  repeated float data = 1;
}

message Vector {
  oneof vector {
    DenseVector dense = 101;
  }
}

message Vectors {
  oneof vectors_options {
    Vector vector = 1;
  }
}

message PointStruct {
  PointId id = 1;
  map<string, Value> payload = 3;
  optional Vectors vectors = 4;
}

message UpsertPoints {
  string collection_name = 1;
  optional bool wait = 2;
  repeated PointStruct points = 3;
}

message RepeatedStrings {
  repeated string strings = 1;
}

message Match {
  oneof match_value {
    string keyword = 1;
    int64 integer = 2;
    bool boolean = 3;
    string text = 4;
    RepeatedStrings keywords = 5;
  }
}

message Range {
  optional double lt = 1;
  optional double gt = 2;
  optional double gte = 3;
  optional double lte = 4;
}

message DatetimeRange {
  optional Timestamp lt = 1;
  optional Timestamp gt = 2;
  optional Timestamp gte = 3;
  optional Timestamp lte = 4;
}

message FieldCondition {
  string key = 1;
  Match match = 2;
  Range range = 3;
  DatetimeRange datetime_range = 8;
}

message Condition {
  oneof condition_one_of {
    FieldCondition field = 1;
    Filter filter = 4;
  }
}

message Filter {
  repeated Condition should = 1;
  repeated Condition must = 2;
  repeated Condition must_not = 3;
}

message PayloadIncludeSelector {
  repeated string fields = 1;
}

message PayloadExcludeSelector {
  repeated string fields = 1;
}

message WithPayloadSelector {
  oneof selector_options {
    bool enable = 1;
    PayloadIncludeSelector include = 2;
    PayloadExcludeSelector exclude = 3;
  }
}

message VectorsSelector {
  repeated string names = 1;
}

message WithVectorsSelector {
  oneof selector_options {
    bool enable = 1;
    VectorsSelector include = 2;
  }
}

message SearchPoints {
  string collection_name = 1;
  repeated float vector = 2;
  Filter filter = 3;
  uint64 limit = 4;
  reserved 5;
  WithPayloadSelector with_payload = 6;
  // Field number 7 is `params` (SearchParams) in upstream Qdrant proto.
  // We carry only the minimal subset we need (quantization rescore toggle).
  optional SearchParams params = 7;
  optional WithVectorsSelector with_vectors = 11;
}

// Subset of upstream's SearchParams; only the quantization knob is needed
  // for int8-rescore bypass benchmarks. See
  // https://qdrant.tech/documentation/concepts/search/#search-api
message SearchParams {
  optional QuantizationSearchParams quantization = 3;
}

message QuantizationSearchParams {
  // If true, after quantized cosine, rescore the top-K via the original
  // (fp32/fp16) vectors. Default true. Set to false for int8-only search
  // (faster but potentially less accurate).
  optional bool rescore = 2;
  // If true, skip the quantized layer entirely and search via the
  // original-precision vectors. We don't use this; default false.
  optional bool ignore = 1;
}

message ScoredPoint {
  PointId id = 1;
  map<string, Value> payload = 2;
  float score = 3;
  reserved 4;
  uint64 version = 5;
}

message SearchResponse {
  repeated ScoredPoint result = 1;
  double time = 2;
}

enum UpdateStatus {
  UnknownUpdateStatus = 0;
  Acknowledged = 1;
  Completed = 2;
  ClockRejected = 3;
  WaitTimeout = 4;
}

message UpdateResult {
  optional uint64 operation_id = 1;
  UpdateStatus status = 2;
}

message PointsOperationResponse {
  UpdateResult result = 1;
  double time = 2;
}

enum FieldType {
  FieldTypeKeyword = 0;
  FieldTypeInteger = 1;
  FieldTypeFloat = 2;
  FieldTypeGeo = 3;
  FieldTypeText = 4;
  FieldTypeBool = 5;
  FieldTypeDatetime = 6;
  FieldTypeUuid = 7;
}

message CreateFieldIndexCollection {
  string collection_name = 1;
  optional bool wait = 2;
  string field_name = 3;
  optional FieldType field_type = 4;
}

message VectorParams {
  uint64 size = 1;
  Distance distance = 2;
}

message VectorsConfig {
  oneof config {
    VectorParams params = 1;
  }
}

message CreateCollection {
  string collection_name = 1;
  optional uint64 timeout = 9;
  optional VectorsConfig vectors_config = 10;
}

message DeleteCollection {
  string collection_name = 1;
  optional uint64 timeout = 2;
}

message CollectionOperationResponse {
  bool result = 1;
  double time = 2;
}

message CollectionExistsRequest {
  string collection_name = 1;
}

message CollectionExists {
  bool exists = 1;
}

message CollectionExistsResponse {
  CollectionExists result = 1;
  double time = 2;
}
